services:
  postgres:
    image: postgres:16-alpine
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "autoblog"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: autoblog
      POSTGRES_USER: autoblog
      POSTGRES_PASSWORD: ${DB_PASSWORD:-autoblog_secret_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - dokploy-network
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npx prisma migrate deploy && node src/index.js"
    environment:
      DATABASE_URL: postgresql://autoblog:${DB_PASSWORD:-autoblog_secret_123}@postgres:5432/autoblog
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      AI_API_KEY: ${AI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.autoblog.rule=Host(`autoblog.spidmax.win`)"
      - "traefik.http.routers.autoblog.entrypoints=websecure"
      - "traefik.http.routers.autoblog.tls.certresolver=letsencrypt"
      - "traefik.http.services.autoblog.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:

networks:
  dokploy-network:
    external: true
